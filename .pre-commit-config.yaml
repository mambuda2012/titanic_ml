repos:
  - repo: https://github.com/psf/black
    rev: 23.1.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort

  - repo: local
    hooks:
      - id: nbqa-black
        name: nbqa-black
        entry: nbqa black
        language: system
        types: [jupyter]
        args: [--nbqa-mutate]

      - id: nbqa-isort
        name: nbqa-isort
        entry: nbqa isort
        language: system
        types: [jupyter]
        args: [--nbqa-mutate]

  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        args:
          - --max-line-length=88
          - --extend-ignore=E203,W503
        exclude: |
          (?x)^(
            .*\.ipynb$
          )$

  # Дополнительная проверка типов (опционально)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.5.1
    hooks:
      - id: mypy
        exclude: |
          (?x)^(
            .*\.ipynb$|
            tests/.*|
            .*_test\.py$
          )$
